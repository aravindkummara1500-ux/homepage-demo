version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 101551113392.dkr.ecr.ap-south-1.amazonaws.com

      - REPOSITORY_URI=101551113392.dkr.ecr.ap-south-1.amazonaws.com/homepage-demo
      - IMAGE_TAG=latest

  build:
    commands:
      - echo Build started
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo Push Docker image
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - echo Creating imagedefinitions.json

      - printf '[{"name":"homepage-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
